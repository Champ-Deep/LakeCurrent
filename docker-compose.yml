services:
  lakefilter:
    image: searxng/searxng:latest
    container_name: lakefilter
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    volumes:
      - ./lakefilter:/etc/searxng:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - lakecurrent

  redis:
    image: valkey/valkey:8-alpine
    container_name: redis
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey_data:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - lakecurrent

  lakeglimpse:
    image: benbusby/whoogle-search:latest
    container_name: lakeglimpse
    restart: unless-stopped
    user: whoogle
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    tmpfs:
      - /config/:size=10M,uid=927,gid=927,mode=1700
    ports:
      - "5000:5000"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      - TZ=Asia/Kolkata
    networks:
      - lakecurrent

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      lakefilter:
        condition: service_healthy
      lakeglimpse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lakecurrent

volumes:
  valkey_data:

networks:
  lakecurrent:
